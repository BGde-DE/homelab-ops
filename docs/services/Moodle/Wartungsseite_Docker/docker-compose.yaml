version: '3.9'

volumes:
  html:
  config:

services:
  app:
    image: nginx
    container_name: nginx_wartungsseite

    volumes:
      - html:/usr/share/nginx/html:ro
      - config:/etc/nginx
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=wartung.domain.de
      - VIRTUAL_PORT=8085
      - LETSENCRYPT_HOST=wartung.domain.de
      - LETSENCRYPT_EMAIL=admin@domain.de

networks:
  default:
    external: true
    name: nginx-proxy
